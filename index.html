<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="titleBox">
        <img class="pokeball"src="images/pokeball.png" alt="">
        <h1 class="title">PokéStudy</h1>
    </div>
    <div class="inputBox">
        <input type="text" class="pokemonInput" placeholder="enter a pokemon">
        <button class="enter">enter</button>
    </div>
    <img class="pokemonPic"src="" alt="">
    <p class="catchTime"></p>
    <button class="addParty"> Add to party </button>
    <div class= "menu">
        <button class="catchButton">
            Catch
        </button>

    </div>
    <div class="mainBox">
        <div>
            <p class="display">
                00:00:00
            </p>  
        </div>
        <div class="controls">
            <button class="startButton">start</button>
            <button class="stopButton">pause</button>
            <button class ="clearButton">clear</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
